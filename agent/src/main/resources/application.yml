# AIOS Agent Configuration

spring:
  application:
    name: aios-agent
  main:
    web-application-type: none

# Agent Configuration
agent:
  collection-interval-seconds: 10
  retention-minutes: 60
  backend-url: http://localhost:8080
  dry-run-mode: false
  protected-processes:
    - System
    - csrss.exe
    - lsass.exe
    - winlogon.exe
    - services.exe
    - smss.exe
    - svchost.exe

# Resilience4j Configuration
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
    instances:
      metricSync:
        base-config: default
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2.0
      issueSync:
        base-config: default
        max-attempts: 5
        wait-duration: 1s
        exponential-backoff-multiplier: 1.5
      actionSync:
        base-config: default
        max-attempts: 5
        wait-duration: 500ms
        exponential-backoff-multiplier: 1.5
      healthCheck:
        base-config: default
        max-attempts: 2
        wait-duration: 1s

# Logging Configuration
logging:
  level:
    root: INFO
    com.aios.agent: DEBUG
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aios-agent.log
    max-size: 10MB
    max-history: 7

# Disable default Spring Boot banner
spring.main.banner-mode: off
