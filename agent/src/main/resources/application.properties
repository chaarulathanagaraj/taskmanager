# AIOS Agent Configuration
spring.application.name=aios-agent

# Agent settings
agent.collection-interval-seconds=10
agent.retention-minutes=60
agent.backend-url=http://localhost:8080
agent.dry-run-mode=false

# Protected processes (comma-separated)
agent.protected-processes=System,csrss.exe,lsass.exe,winlogon.exe,services.exe,smss.exe,svchost.exe

# Logging
logging.level.com.aios.agent=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
