# AIOS Agent Test Configuration
spring.profiles.active=test

# Agent configuration for testing
agent.collection-interval-seconds=1
agent.retention-minutes=5
agent.backend-url=http://localhost:0
agent.dry-run-mode=true
agent.auto-remediation-enabled=false
agent.max-concurrent-actions=3
agent.auto-remediation-confidence-threshold=0.85
agent.backend-sync-enabled=false

# Logging - Minimal for tests
logging.level.root=WARN
logging.level.com.aios=INFO

# Server - Random port for tests
server.port=0
