# AIOS Backend Configuration
spring.application.name=aios-backend
server.port=8080

# Database - Configured for H2 (In-Memory) to avoid Postgres connection issues on startup
spring.datasource.url=jdbc:h2:mem:aios;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# MCP Server
mcp.server.url=http://localhost:8082

# Logging
logging.level.com.aios.backend=INFO

gemini.api.key=${GEMINI_API_KEY:}

