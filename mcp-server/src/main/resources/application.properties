# AIOS MCP Server Configuration
spring.application.name=aios-mcp-server
server.port=8082

# MCP Security
aios.mcp.api-key=${MCP_API_KEY:}
aios.mcp.auth.enabled=${MCP_AUTH_ENABLED:true}

# Logging
logging.level.com.aios.mcp=DEBUG

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
